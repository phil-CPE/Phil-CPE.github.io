<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring | Ina</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #FFC0CB; /* Pink */
            --bg: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.6);
            --text-main: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }
        /* Big Title Styling */
        .main-title {
            font-size: 3.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 192, 203, 0.4);
            text-align: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 2px solid var(--primary);
            border-radius: 20px;
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 500px;
            margin-bottom: 2rem;
        }
        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 1rem;
        }
        h2 { font-size: 2rem; margin: 0; color: var(--primary); }
        .about { color: #f8fafc; line-height: 1.6; margin: 1.2rem 0; font-size: 1.1rem; font-weight: bold; }
        
        .graph-container {
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 192, 203, 0.3);
        }

        /* Mobile adjustment for the big title */
        @media (max-width: 600px) {
            .main-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <h1 class="main-title">ENERGY MONITORING</h1>

    <div class="container">
        <img src="phil-portfolio.png" alt="Profile photo" class="profile-pic">
        <h2>Hi, I'm Ina</h2>
        <p class="about">TEST TEST TEST ENERGY GAP GAPGAP</p>
    </div>

    <div class="graph-container">
        <h3 style="color: #333; text-align: center; margin-top: 0; font-family: sans-serif;">Live Performance Tracking</h3>
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('myChart');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Energy Levels',
                    data: [12, 19, 15, 8, 22, 30, 25],
                    borderColor: '#FFC0CB',
                    backgroundColor: 'rgba(255, 192, 203, 0.3)',
                    borderWidth: 4,
                    pointBackgroundColor: '#FFC0CB',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>

</body>
</html>
