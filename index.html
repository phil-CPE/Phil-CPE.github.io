<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring | Ina</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark-pink: #970747;
            --white: #FFFFFF;
            --overlay: rgba(0, 0, 0, 0.6); /* Makes text readable over background */
        }
        body {
            /* Replace 'phil-portfolio2.png' with your actual filename extension if it's .jpg */
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('phil-portfolio2.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }
        .main-title {
            font-size: 3.5rem;
            color: var(--white);
            background-color: var(--dark-pink);
            padding: 10px 30px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 4px solid var(--dark-pink);
            border-radius: 20px;
            background: rgba(151, 7, 71, 0.2); /* Transparent dark pink */
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 500px;
            margin-bottom: 2rem;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
            margin-bottom: 1rem;
        }
        h2 { font-size: 2.2rem; margin: 0; color: var(--white); }
        .about { 
            color: var(--white); 
            line-height: 1.6; 
            margin: 1.2rem 0; 
            font-size: 1.2rem; 
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .graph-container {
            width: 100%;
            max-width: 550px;
            background: var(--white);
            padding: 1.5rem;
            border-radius: 20px;
            border: 5px solid var(--dark-pink);
        }
        @media (max-width: 600px) {
            .main-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <h1 class="main-title">ENERGY MONITORING</h1>

    <div class="container">
        <img src="phil-portfolio.png" alt="Profile photo" class="profile-pic">
        <h2>Hi, I'm Ina</h2>
        <p class="about">TEST TEST TEST ENERGY GAP GAPGAP</p>
    </div>

    <div class="graph-container">
        <h3 style="color: #970747; text-align: center; margin-top: 0; font-weight: bold;">LIVE PERFORMANCE TRACKING</h3>
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('myChart');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Energy Levels',
                    data: [15, 25, 10, 30, 18, 45, 35],
                    borderColor: '#970747',
                    backgroundColor: 'rgba(151, 7, 71, 0.1)',
                    borderWidth: 5,
                    pointBackgroundColor: '#970747',
                    pointRadius: 6,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#970747', font: { weight: 'bold' } } }
                },
                scales: {
                    y: { ticks: { color: '#970747' }, beginAtZero: true },
                    x: { ticks: { color: '#970747' } }
                }
            }
        });
    </script>

</body>
</html>
