<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring | Ina & Aljun</title>
    <style>
        :root {
            --dark: #1a1a1a; 
            --off-white: #f5f5f5;
            --accent-pink: #FFC0CB;
            --accent-blue: #64ffda;
            --text: #ffffff;
            --sub-text: rgba(255, 255, 255, 0.7);
        }
        body {
            background-color: var(--off-white);
            color: var(--dark);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .landing-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
        }
        .main-container {
            background-color: var(--dark);
            border-radius: 20px;
            min-height: 600px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* NAVIGATION - CLEANED UP */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 3rem;
        }
        .site-logo { color: var(--text); font-size: 1.5rem; }
        .nav-links { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.8rem; letter-spacing: 1px; }

        /* HERO CONTENT */
        .hero-section {
            display: flex;
            flex-grow: 1;
            padding: 0 5rem;
            align-items: center;
            justify-content: flex-end; 
        }
        .hero-content {
            text-align: right;
            max-width: 500px;
        }
        .hero-title {
            font-size: 5.5rem;
            margin: 0;
            line-height: 0.9;
            font-weight: 900;
            color: var(--text);
            text-transform: capitalize;
        }
        .hero-title span.pink { color: var(--accent-pink); }
        .hero-title span.blue { color: var(--accent-blue); }
        
        .names-sub {
            margin-top: 2rem;
            color: var(--text);
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        /* ESP LINK BUTTON */
        .esp-link-btn {
            display: inline-block;
            margin-top: 1.5rem;
            text-decoration: none;
            background-color: var(--accent-pink);
            color: var(--dark);
            padding: 0.8rem 2.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s ease;
        }
        .esp-link-btn:hover {
            background-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        /* IMAGE / DATA PLACEHOLDER */
        .image-placeholder {
            background: #e0e0e0;
            margin: 0 5rem 3rem 3rem;
            height: 200px;
            width: 50%;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #333;
            font-weight: bold;
            text-align: center;
        }
        #live-data {
            font-size: 2.5rem;
            color: var(--dark);
            margin-top: 10px;
        }

        /* FOOTER */
        footer {
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            background: #111;
        }
        footer a { color: var(--sub-text); text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="landing-wrapper">
        <div class="main-container">
            <nav>
                <div class="site-logo">⦿</div>
                <ul class="nav-links">
                    <li><a href="#">HOME</a></li>
                    <li><a href="#">ABOUT</a></li>
                    <li><a href="#">GALLERY</a></li>
                    <li><a href="#">EVENT</a></li>
                    <li><a href="#">CONTACT</a></li>
                </ul>
                </nav>

            <div class="hero-section">
                <div class="hero-content">
                    <h1 class="hero-title">
                        Energy<br>
                        <span class="pink">Monitor</span><span class="blue">ing</span>
                    </h1>
                    <p class="names-sub">Ina Peromingan and Aljun Dela Peña</p>
                    <a href="http://192.168.1.100" class="esp-link-btn" id="esp-link">LINK TO ESP</a>
                </div>
            </div>

            <div class="image-placeholder">
                <div style="font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">Live Reading</div>
                <div id="live-data">0.00 W</div>
            </div>

            <footer>
                <a href="#">🐦</a>
                <a href="#">𝑓</a>
                <a href="#">📸</a>
            </footer>
        </div>
    </div>

    <script>
        // 1. Simulating real-time data from your ESP
        const dataDisplay = document.getElementById('live-data');
        
        function updateEnergyReading() {
            // This is where you would normally use fetch('http://your-esp-ip/data')
            // For now, let's simulate a shifting power reading
            const simulatedPower = (Math.random() * (250 - 220) + 220).toFixed(2);
            dataDisplay.innerText = `${simulatedPower} W`;
        }

        // Update the reading every 2 seconds
        setInterval(updateEnergyReading, 2000);

        // 2. Button Link handling
        // Make sure to replace the IP address in the HTML with your actual ESP IP
        const espBtn = document.getElementById('esp-link');
        espBtn.addEventListener('click', function(e) {
            console.log("Attempting to connect to ESP hardware...");
        });
    </script>
</body>
</html>
