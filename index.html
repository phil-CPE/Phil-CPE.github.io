<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring | Ina & Aljun</title>
    <style>
        :root {
            --dark: #1a1a1a; 
            --off-white: #f5f5f5;
            --accent-pink: #FFC0CB;
            --accent-blue: #64ffda;
            --text: #ffffff;
            --sub-text: rgba(255, 255, 255, 0.7);
        }
        body {
            background-color: var(--off-white);
            color: var(--dark);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .landing-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
        }
        .main-container {
            background-color: var(--dark);
            border-radius: 20px;
            min-height: 600px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* NAVIGATION */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 3rem;
        }
        .site-logo { color: var(--text); font-size: 1.5rem; }
        .nav-links { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.8rem; letter-spacing: 1px; }
        .login-btn { text-decoration: none; border: 1px solid var(--text); color: var(--text); padding: 0.6rem 1.8rem; border-radius: 5px; font-size: 0.8rem; }

        /* HERO CONTENT */
        .hero-section {
            display: flex;
            flex-grow: 1;
            padding: 0 5rem;
            align-items: center;
            justify-content: flex-end; /* Matches the layout in your image */
        }
        .hero-content {
            text-align: right;
            max-width: 500px;
        }
        .hero-title {
            font-size: 5.5rem;
            margin: 0;
            line-height: 0.9;
            font-weight: 900;
            color: var(--text);
            text-transform: capitalize;
        }
        .hero-title span.pink { color: var(--accent-pink); }
        .hero-title span.blue { color: var(--accent-blue); }
        
        .names-sub {
            margin-top: 2rem;
            color: var(--text);
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
        .thesis-btn {
            display: inline-block;
            margin-top: 1.5rem;
            text-decoration: none;
            border: 1px solid var(--accent-pink);
            color: var(--text);
            padding: 0.8rem 2.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* IMAGE PLACEHOLDER */
        .image-placeholder {
            background: #e0e0e0;
            margin: 0 5rem 3rem 3rem;
            height: 200px;
            width: 50%;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
            font-weight: bold;
            font-size: 2rem;
            text-align: center;
        }

        /* FOOTER SOCIALS */
        footer {
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            background: #111;
        }
        footer a { color: var(--sub-text); text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="landing-wrapper">
        <div class="main-container">
            <nav>
                <div class="site-logo">⦿</div>
                <ul class="nav-links">
                    <li><a href="#">HOME</a></li>
                    <li><a href="#">ABOUT</a></li>
                    <li><a href="#">GALLERY</a></li>
                    <li><a href="#">EVENT</a></li>
                    <li><a href="#">CONTACT</a></li>
                </ul>
                <a href="#" class="login-btn">LOGING</a>
            </nav>

            <div class="hero-section">
                <div class="hero-content">
                    <h1 class="hero-title">
                        Energy<br>
                        <span class="pink">Monitor</span><span class="blue">ing</span>
                    </h1>
                    <p class="names-sub">Ina Peromingan and Aljun Dela Peña</p>
                    <a href="https://github.com/Phil-CPE?tab=repositories" class="thesis-btn">THESIS DATA</a>
                </div>
            </div>

            <div class="image-placeholder">
                Main image placeholder<br>
                (letters for now)
            </div>

            <footer>
                <a href="#">🐦</a>
                <a href="#">𝑓</a>
                <a href="#">📸</a>
            </footer>
        </div>
    </div>

</body>
</html>
