<!DOCTYPE html>
<html>
<head>
    <title>Dorm Energy Monitoring Dashboard</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; }
        
        /* Header styling to put title and motor side-by-side */
        .header-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            background: #2d2d2d;
            border-bottom: 2px solid #00ffcc;
        }

        h1 { margin: 0 20px; }

        #motor-canvas { 
            width: 100px; /* Small size for header */
            height: 100px; 
        }

        .container { width: 90%; margin: 20px auto; background: #2d2d2d; padding: 20px; border-radius: 10px; }
        iframe { width: 100%; height: 600px; border: none; }
    </style>
</head>
<body>

    <div class="header-container">
        <div id="motor-canvas"></div>
        <h1>Dorm Energy Monitoring System</h1>
    </div>

    <div class="container">
        <h3>Live Data Log (Rooms 1-3)</h3>
        <iframe src="https://docs.google.com/spreadsheets/d/e/YOUR_SHEET_ID/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        // Adjusted aspect ratio for the small header box
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        const container = document.getElementById('motor-canvas');
        renderer.setSize(100, 100);
        container.appendChild(renderer.domElement);

        const group = new THREE.Group();
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });

        // Stator
        const statorGeo = new THREE.CylinderGeometry(1, 1, 2, 12, 4, true);
        const stator = new THREE.Mesh(statorGeo, wireframeMat);
        group.add(stator);

        // Rotor Shaft
        const shaftGeo = new THREE.CylinderGeometry(0.15, 0.15, 2.8, 8, 1, true);
        const shaft = new THREE.Mesh(shaftGeo, wireframeMat);
        group.add(shaft);

        // Capacitor
        const capGeo = new THREE.BoxGeometry(0.5, 0.8, 0.5);
        const capacitor = new THREE.Mesh(capGeo, wireframeMat);
        capacitor.position.set(0.9, 0.3, 0);
        group.add(capacitor);

        scene.add(group);
        camera.position.z = 4; // Moved slightly closer for small view

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.x += 0.01;
            group.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
