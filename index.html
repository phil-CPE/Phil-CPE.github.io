<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ina | Portfolio</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #64ffda;
            --bg: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .container {
            text-align: center;
            padding: 3rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            max-width: 500px;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 1.5rem;
        }
        h1 { font-size: 2.8rem; margin: 0; }
        .highlight { color: var(--primary); }
        .about { color: #cbd5e1; line-height: 1.7; margin: 2rem 0; font-size: 1.2rem; font-weight: bold; }
        .btn {
            text-decoration: none;
            color: var(--bg);
            background: var(--primary);
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="phil-portfolio.png" alt="Profile photo" class="profile-pic">
        
        <h1>Hi, I'm <span class="highlight">Ina</span></h1>
        
        <p class="about">
            TEST TEST TEST ENERGY GAP GAPGAP
        </p>
        
        <div class="links">
            <a href="https://github.com/Phil-CPE?tab=repositories" class="btn">Explore My Projects</a>
        </div>
    </div>
</body>
</html>
