<!DOCTYPE html>
<html>
<head>
    <title>Dorm Energy Monitoring - PSC Motor View</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; }
        .container { width: 90%; margin: 20px auto; background: #2d2d2d; padding: 20px; border-radius: 10px; }
        #motor-canvas { width: 100%; height: 400px; }
        iframe { width: 100%; height: 500px; border: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Dorm Energy Monitoring System</h1>
    
    <div class="container">
        <h3>System Load Representation (PSC Motor)</h3>
        <div id="motor-canvas"></div>
    </div>

    <div class="container">
        <h3>Live Data Log</h3>
        <iframe src="https://docs.google.com/spreadsheets/d/e/YOUR_SHEET_ID/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / 400, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        const container = document.getElementById('motor-canvas');
        renderer.setSize(container.clientWidth, 400);
        container.appendChild(renderer.domElement);

        // --- PSC Motor Geometry ---
        const group = new THREE.Group();

        // Stator (Main Body)
        const statorGeo = new THREE.CylinderGeometry(1, 1, 2, 12, 1, true);
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });
        const stator = new THREE.Mesh(statorGeo, wireframeMat);
        group.add(stator);

        // Rotor Shaft
        const shaftGeo = new THREE.CylinderGeometry(0.2, 0.2, 3, 8, 1, true);
        const shaft = new THREE.Mesh(shaftGeo, wireframeMat);
        group.add(shaft);

        // Capacitor Housing (The box on top)
        const capGeo = new THREE.BoxGeometry(0.6, 0.8, 0.6);
        const capacitor = new THREE.Mesh(capGeo, wireframeMat);
        capacitor.position.set(0.8, 0.2, 0); // Positioned on the side/top
        group.add(capacitor);

        scene.add(group);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.x += 0.01;
            group.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(container.clientWidth, 400);
            camera.aspect = container.clientWidth / 400;
            camera.updateProjectionMatrix();
        });

        animate();
    </script>
</body>
</html>
