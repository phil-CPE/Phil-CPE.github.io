<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring | Interactive Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark: #0a0a0a;
            --pink: #FFC0CB;
            --teal: #64ffda;
            --gold: #FFD700;
            --white: #ffffff;
        }
        body {
            background-color: #000;
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CLICKABLE LINKING BUTTON */
        .linking-link {
            position: absolute;
            top: 25px;
            right: 35px;
            color: var(--pink);
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            text-decoration: none;
            border: 1px solid var(--pink);
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .linking-link:hover {
            background: rgba(255, 192, 203, 0.1);
            box-shadow: 0 0 15px var(--pink);
            transform: translateY(-2px);
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--pink);
            border-radius: 50%;
        }
        .active-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* TOP SECTION */
        .top-content {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .top-content h1 { font-size: 3.5rem; margin: 0; color: var(--pink); text-transform: uppercase; letter-spacing: 5px; }
        .top-content h2 { font-size: 1.2rem; color: var(--teal); letter-spacing: 2px; margin: 5px 0; }
        .top-content p { max-width: 700px; color: #aaa; line-height: 1.6; font-size: 0.9rem; margin-top: 10px; }

        /* BOTTOM DOORS */
        .bottom-doors { display: flex; width: 100%; height: 60vh; background: var(--dark); }
        .room-door {
            position: relative; flex: 1; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden; display: flex; flex-direction: column; justify-content: center;
            align-items: center; cursor: pointer; border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .room-door:hover { flex: 3; background: rgba(255, 255, 255, 0.03); }
        .room-name { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; transform: rotate(-90deg); transition: 0.5s; opacity: 0.5; }
        .room-door:hover .room-name { transform: rotate(0deg); opacity: 1; font-size: 1.8rem; margin-bottom: 15px; }

        .graph-content {
            width: 80%; height: 200px; opacity: 0; transform: scale(0.95); transition: 0.4s 0.2s;
            background: rgba(255,255,255, 0.95); padding: 20px; border-radius: 15px; pointer-events: none;
        }
        .room-door:hover .graph-content { opacity: 1; transform: scale(1); pointer-events: all; }
        .power-val { font-size: 1.4rem; font-weight: bold; margin-top: 8px; text-align: center; color: #000; }

        #door1 { border-top: 4px solid var(--pink); }
        #door2 { border-top: 4px solid var(--teal); }
        #door3 { border-top: 4px solid var(--gold); }
    </style>
</head>
<body>

    <a href="http://192.168.1.100" class="linking-link" id="main-trigger" target="_blank">
        <div class="pulse-dot" id="dot"></div>
        <span id="btn-text">LINKING...</span>
    </a>

    <div class="top-content">
        <h1>Energy Monitoring System</h1>
        <h2>Ina Peromingan & Aljun Dela Peña</h2>
        <p>Click the link above to establish a hardware connection and begin the multi-room outcome analysis.</p>
    </div>

    <div class="bottom-doors">
        <div class="room-door" id="door1">
            <div class="room-name" style="color: var(--pink);">Room 1</div>
            <div class="graph-content">
                <canvas id="chart1"></canvas>
                <div class="power-val" id="val1">0.00 W</div>
            </div>
        </div>
        <div class="room-door" id="door2">
            <div class="room-name" style="color: var(--teal);">Room 2</div>
            <div class="graph-content">
                <canvas id="chart2"></canvas>
                <div class="power-val" id="val2">0.00 W</div>
            </div>
        </div>
        <div class="room-door" id="door3">
            <div class="room-name" style="color: var(--gold);">Room 3</div>
            <div class="graph-content">
                <canvas id="chart3"></canvas>
                <div class="power-val" id="val3">0.00 W</div>
            </div>
        </div>
    </div>

    <script>
        const colors = { 1: '#FFC0CB', 2: '#64ffda', 3: '#FFD700' };
        const charts = {};
        let active = false;

        function createChart(id, color) {
            const ctx = document.getElementById(`chart${id}`).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['', '', '', '', '', '', '', '', '', ''],
                    datasets: [{
                        data: Array(10).fill(0),
                        borderColor: color,
                        backgroundColor: color + '11',
                        borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { display: false, min: 0, max: 400 }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        for(let i=1; i<=3; i++) { charts[i] = createChart(i, colors[i]); }

        const trigger = document.getElementById('main-trigger');
        const dot = document.getElementById('dot');
        const txt = document.getElementById('btn-text');

        trigger.addEventListener('click', function(e) {
            // Remove the next line if you want to open the ESP link in a new tab
            // e.preventDefault(); 
            
            active = true;
            dot.classList.add('active-pulse');
            txt.innerText = "CONNECTED";
            trigger.style.color = "var(--teal)";
            trigger.style.borderColor = "var(--teal)";
            dot.style.backgroundColor = "var(--teal)";
        });

        setInterval(() => {
            if(!active) return;
            const ranges = { 1: [218, 228], 2: [145, 160], 3: [305, 325] };
            for(let i=1; i<=3; i++) {
                const newVal = (Math.random() * (ranges[i][1] - ranges[i][0]) + ranges[i][0]).toFixed(2);
                document.getElementById(`val${i}`).innerText = `${newVal} W`;
                document.getElementById(`val${i}`).style.color = colors[i];
                charts[i].data.datasets[0].data.push(newVal);
                charts[i].data.datasets[0].data.shift();
                charts[i].update('none');
            }
        }, 1000);
    </script>
</body>
</html>
