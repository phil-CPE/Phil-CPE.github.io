<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring | Professional CpE UI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark-bg: #000000;
            --pure-white: #ffffff;
            --muted-white: rgba(255, 255, 255, 0.6);
            --border-color: #222222;
            --accent-gray: #444444;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--pure-white);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* FALLING STARS / METEORS */
        .star {
            position: absolute;
            width: 2px;
            height: 50px;
            background: linear-gradient(to bottom, transparent, #fff);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) translateX(0) rotate(-20deg); opacity: 1; }
            100% { transform: translateY(110vh) translateX(-200px) rotate(-20deg); opacity: 0; }
        }

        /* TOGGLE BUTTON */
        #status-toggle {
            position: absolute;
            top: 25px;
            right: 40px;
            color: var(--pure-white);
            font-weight: 600;
            border: 1px solid var(--pure-white);
            padding: 10px 22px;
            border-radius: 2px;
            z-index: 1000;
            cursor: pointer;
            background: rgba(0,0,0,0.8);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #status-toggle.connected { background: var(--pure-white); color: var(--dark-bg); }

        /* HEADER & CUBE */
        .top-content {
            height: 35vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            background: #050505;
        }

        .cube-container {
            position: absolute;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            z-index: 1;
        }

        .cube {
            position: absolute;
            width: 150px;
            height: 150px;
            top: 20%;
            left: 10%;
            transform-style: preserve-3d;
            animation: rotateCube 15s infinite linear;
        }

        .cube-face {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 1.5px solid var(--pure-white);
            background: rgba(255, 255, 255, 0.01);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: border-color 1s ease;
        }

        .cube-face::before, .cube-face::after {
            content: '';
            position: absolute;
            width: 141%;
            height: 1px;
            background: currentColor;
            opacity: 0.4;
        }
        .cube-face::before { transform: rotate(45deg); }
        .cube-face::after { transform: rotate(-45deg); }

        .front  { transform: translateZ(75px); }
        .back   { transform: rotateY(180deg) translateZ(75px); }
        .left   { transform: rotateY(-90deg) translateZ(75px); }
        .right  { transform: rotateY(90deg) translateZ(75px); }
        .top    { transform: rotateX(90deg) translateZ(75px); }
        .bottom { transform: rotateX(-90deg) translateZ(75px); }

        @keyframes rotateCube {
            from { transform: rotateX(0deg) rotateY(0deg); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        .title-layer { position: relative; z-index: 10; }
        .title-layer h1 { font-size: 3rem; margin: 0; letter-spacing: 8px; font-weight: 800; text-transform: uppercase; }
        .presented-by { font-size: 1rem; color: var(--muted-white); margin-top: 15px; letter-spacing: 3px; font-weight: 300; }
        .presented-by span { color: var(--pure-white); font-weight: 500; }

        /* ROOMS & GRAPH */
        .page { display: none; height: 55vh; overflow-y: auto; flex-direction: column; z-index: 5; }
        .page.active { display: flex; }
        .room-row {
            flex: 1; display: flex; align-items: center; padding: 25px 5rem;
            border-bottom: 1px solid var(--border-color);
            transition: 0.4s ease; cursor: pointer;
            background: rgba(0,0,0,0.6);
        }
        .room-row:hover { flex: 4; background: rgba(8, 8, 8, 0.9); }
        .room-label { font-size: 1.4rem; font-weight: 700; min-width: 220px; letter-spacing: 2px; }

        .data-viz { flex-grow: 1; height: 180px; display: flex; align-items: center; gap: 40px; opacity: 0; transition: 0.5s; }
        .room-row:hover .data-viz { opacity: 1; }
        .canvas-wrap { flex-grow: 1; height: 100%; background: #ffffff; border-radius: 2px; padding: 15px; }
        .power-out { min-width: 180px; font-size: 3rem; font-weight: 200; text-align: right; font-family: 'Courier New', monospace; }

        .pagination {
            height: 10vh; display: flex; justify-content: center; align-items: center;
            gap: 20px; background: var(--dark-bg); border-top: 1px solid var(--border-color); margin-top: auto; z-index: 10;
        }
        .page-btn {
            background: transparent; border: 1px solid var(--accent-gray); color: var(--accent-gray);
            width: 45px; height: 45px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .page-btn.active { color: var(--pure-white); border-color: var(--pure-white); background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

    <button id="status-toggle">
        <div id="dot" style="width:8px; height:8px; background:white; border-radius:50%;"></div>
        <span id="label">Link</span>
    </button>

    <div class="top-content">
        <div class="cube-container">
            <div class="cube" id="rainbow-cube">
                <div class="cube-face front"></div>
                <div class="cube-face back"></div>
                <div class="cube-face left"></div>
                <div class="cube-face right"></div>
                <div class="cube-face top"></div>
                <div class="cube-face bottom"></div>
            </div>
        </div>
        
        <div class="title-layer">
            <h1>Energy Monitoring System</h1>
            <div class="presented-by">Presented by: <span>Ina Peromingan & Aljon Dela Peña</span></div>
        </div>
    </div>

    <div id="page1" class="page active">
        <div class="room-row">
            <div class="room-label">ROOM 01</div>
            <div class="data-viz">
                <div class="canvas-wrap"><canvas id="c1"></canvas></div>
                <div class="power-out" id="v1">0.00 W</div>
            </div>
        </div>
        <div class="room-row">
            <div class="room-label">ROOM 02</div>
            <div class="data-viz">
                <div class="canvas-wrap"><canvas id="c2"></canvas></div>
                <div class="power-out" id="v2">0.00 W</div>
            </div>
        </div>
        <div class="room-row">
            <div class="room-label">ROOM 03</div>
            <div class="data-viz">
                <div class="canvas-wrap"><canvas id="c3"></canvas></div>
                <div class="power-out" id="v3">0.00 W</div>
            </div>
        </div>
    </div>

    <div id="page2" class="page">
        <div style="padding: 5rem; text-align: center;">
            <div style="background: #0a0a0a; padding: 40px; border: 1px solid var(--border-color); display: inline-block;">
                <h3>Technical Overview</h3>
                <p>Advanced telemetry synchronization for industrial hardware outcomes.</p>
            </div>
        </div>
    </div>

    <div id="page3" class="page">
        <div style="padding: 2rem; text-align: center;">
            <img src="phil-portfolio3.gif" alt="Outcome" style="border: 1px solid var(--border-color); max-height: 400px;">
        </div>
    </div>

    <div class="pagination">
        <button class="page-btn active" onclick="showPage(1)">01</button>
        <button class="page-btn" onclick="showPage(2)">02</button>
        <button class="page-btn" onclick="showPage(3)">03</button>
    </div>

    <script>
        const charts = {};
        let isRunning = false;

        // 1. RAINBOW CUBE LOGIC
        const cubeFaces = document.querySelectorAll('.cube-face');
        let hue = 0;
        setInterval(() => {
            hue = (hue + 45) % 360;
            cubeFaces.forEach(face => {
                face.style.borderColor = `hsla(${hue}, 70%, 70%, 0.8)`;
                face.style.color = `hsla(${hue}, 70%, 70%, 0.8)`;
            });
        }, 1000);

        // 2. FALLING STARS LOGIC (Every 5 seconds)
        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * window.innerWidth + 'px';
            star.style.animation = 'fall 1.5s linear forwards';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 2000);
        }
        setInterval(createStar, 5000);

        // 3. GRAPH LOGIC (With Axis Numbers)
        function initChart(id) {
            return new Chart(document.getElementById(`c${id}`).getContext('2d'), {
                type: 'line',
                data: { 
                    labels: Array(30).fill(''), 
                    datasets: [{ 
                        data: Array(30).fill(0), 
                        borderColor: '#000', 
                        borderWidth: 2, 
                        tension: 0.2, 
                        fill: false, 
                        pointRadius: 0 
                    }] 
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { 
                            display: true, 
                            min: 0, 
                            max: 400, 
                            ticks: { 
                                color: '#000', 
                                font: { size: 10, weight: 'bold' },
                                stepSize: 100,
                                callback: function(value) { return value + 'W'; }
                            },
                            grid: { color: 'rgba(0,0,0,0.1)' }
                        }, 
                        x: { display: false } 
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
        for(let i=1; i<=3; i++) charts[i] = initChart(i);

        // 4. CONTROLS
        document.getElementById('status-toggle').addEventListener('click', function() {
            isRunning = !isRunning;
            this.classList.toggle('connected');
            document.getElementById('label').innerText = isRunning ? "Connected" : "Link";
            if(!isRunning) resetData();
        });

        function resetData() {
            for(let i=1; i<=3; i++) {
                document.getElementById(`v${i}`).innerText = "0.00 W";
                charts[i].data.datasets[0].data = Array(30).fill(0);
                charts[i].update();
            }
        }

        function showPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            document.querySelectorAll('.page-btn')[num-1].classList.add('active');
        }

        setInterval(() => {
            if(!isRunning) return;
            const ranges = { 1: [215, 235], 2: [145, 165], 3: [310, 340] };
            for(let i=1; i<=3; i++) {
                const val = (Math.random() * (ranges[i][1] - ranges[i][0]) + ranges[i][0]).toFixed(2);
                document.getElementById(`v${i}`).innerText = `${val} W`;
                charts[i].data.datasets[0].data.push(val); 
                charts[i].data.datasets[0].data.shift();
                charts[i].update('none');
            }
        }, 800);
    </script>
</body>
</html>
