<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring | Sliding UI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark: #0a0a0a;
            --pink: #FFC0CB;
            --teal: #64ffda;
            --gold: #FFD700;
            --white: #ffffff;
        }
        body {
            background-color: #000;
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* MAIN WRAPPER */
        .sliding-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: var(--dark);
        }

        /* INDIVIDUAL ROOM DOORS */
        .room-door {
            position: relative;
            flex: 1; /* All doors start equal size */
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* When Hovered - The "Sliding Open" Effect */
        .room-door:hover {
            flex: 3; /* Expands significantly */
            background: rgba(255, 255, 255, 0.03);
        }

        /* ROOM LABELS */
        .room-name {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            transform: rotate(-90deg); /* Vertical when closed */
            transition: 0.5s;
            pointer-events: none;
            white-space: nowrap;
            opacity: 0.5;
        }
        .room-door:hover .room-name {
            transform: rotate(0deg); /* Flips horizontal when opened */
            opacity: 1;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        /* GRAPH CONTAINER - Hidden until door opens */
        .graph-content {
            width: 80%;
            height: 300px;
            opacity: 0;
            transform: translateY(30px);
            transition: 0.5s 0.2s; /* Delayed fade in */
            background: rgba(255,255,255, 0.9);
            padding: 20px;
            border-radius: 15px;
            pointer-events: none;
        }
        .room-door:hover .graph-content {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        /* LIVE POWER TEXT */
        .power-val {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            color: #000;
        }

        /* TOP OVERLAY TITLES */
        .header-info {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            pointer-events: none;
        }
        .header-info h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: var(--pink); }
        .header-info p { margin: 0; font-size: 0.8rem; opacity: 0.7; }

        /* COLORS PER ROOM */
        #door1 { border-left: 4px solid var(--pink); }
        #door2 { border-left: 4px solid var(--teal); }
        #door3 { border-left: 4px solid var(--gold); }
    </style>
</head>
<body>

    <div class="header-info">
        <h1>ENERGY MONITORING SYSTEM</h1>
        <p>Ina Peromingan & Aljun Dela Peña</p>
    </div>

    <div class="sliding-container">
        <div class="room-door" id="door1">
            <div class="room-name" style="color: var(--pink);">ROOM 1</div>
            <div class="graph-content">
                <canvas id="chart1"></canvas>
                <div class="power-val" id="val1" style="color: var(--pink);">0.00 W</div>
            </div>
        </div>

        <div class="room-door" id="door2">
            <div class="room-name" style="color: var(--teal);">ROOM 2</div>
            <div class="graph-content">
                <canvas id="chart2"></canvas>
                <div class="power-val" id="val2" style="color: var(--teal);">0.00 W</div>
            </div>
        </div>

        <div class="room-door" id="door3">
            <div class="room-name" style="color: var(--gold);">ROOM 3</div>
            <div class="graph-content">
                <canvas id="chart3"></canvas>
                <div class="power-val" id="val3" style="color: #d4af37;">0.00 W</div>
            </div>
        </div>
    </div>

    <script>
        const colors = { 1: '#FFC0CB', 2: '#64ffda', 3: '#FFD700' };
        const charts = {};

        function createChart(id, color) {
            const ctx = document.getElementById(`chart${id}`).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['', '', '', '', '', '', '', '', '', ''],
                    datasets: [{
                        data: Array(10).fill(0),
                        borderColor: color,
                        backgroundColor: color + '22',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false, display: false }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Initialize all 3 charts
        for(let i=1; i<=3; i++) {
            charts[i] = createChart(i, colors[i]);
        }

        // Live Data Simulation for all 3 ESPs simultaneously
        setInterval(() => {
            const ranges = { 1: [210, 230], 2: [140, 160], 3: [300, 340] };
            
            for(let i=1; i<=3; i++) {
                const newVal = (Math.random() * (ranges[i][1] - ranges[i][0]) + ranges[i][0]).toFixed(2);
                document.getElementById(`val${i}`).innerText = `${newVal} W`;
                
                charts[i].data.datasets[0].data.push(newVal);
                charts[i].data.datasets[0].data.shift();
                charts[i].update('none'); // Update without animation for performance
            }
        }, 800);
    </script>
</body>
</html>
