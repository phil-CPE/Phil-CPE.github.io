<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring | Toggle System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark: #0a0a0a;
            --pink: #FFC0CB;
            --teal: #64ffda;
            --gold: #FFD700;
            --white: #ffffff;
        }
        body {
            background-color: #000;
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* TOGGLE BUTTON STYLING */
        #status-toggle {
            position: absolute;
            top: 25px;
            right: 35px;
            color: var(--pink);
            font-weight: bold;
            text-decoration: none;
            border: 1px solid var(--pink);
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: transparent;
            transition: 0.3s;
        }
        #status-toggle.connected {
            color: var(--teal);
            border-color: var(--teal);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.3);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--pink);
            border-radius: 50%;
        }
        .active-pulse { animation: pulse 1.5s infinite; background-color: var(--teal); }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* TOP SECTION */
        .top-content {
            height: 30vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .top-content h1 { font-size: 2.8rem; margin: 0; color: var(--pink); text-transform: uppercase; letter-spacing: 4px; }
        .top-content h2 { font-size: 1.1rem; color: var(--teal); margin: 5px 0; }

        /* ROOM ROWS */
        .rooms-container { display: flex; flex-direction: column; height: 70vh; }
        .room-row {
            flex: 1; display: flex; align-items: center; padding: 0 4rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden; cursor: pointer;
        }
        .room-row:hover { flex: 4; background: rgba(255, 255, 255, 0.03); }
        .room-label { font-size: 2rem; font-weight: 900; min-width: 250px; }

        .data-area {
            flex-grow: 1; height: 80%; display: flex; align-items: center;
            gap: 40px; opacity: 0; transform: translateX(30px); transition: 0.4s;
        }
        .room-row:hover .data-area { opacity: 1; transform: translateX(0); }
        .canvas-box { flex-grow: 1; height: 100%; background: #eee; border-radius: 10px; padding: 10px; }
        .power-txt { min-width: 180px; font-size: 2.8rem; font-weight: bold; text-align: right; }

        #r1 { border-left: 8px solid var(--pink); }
        #r2 { border-left: 8px solid var(--teal); }
        #r3 { border-left: 8px solid var(--gold); }
    </style>
</head>
<body>

    <button id="status-toggle">
        <div id="dot" class="pulse-dot"></div>
        <span id="label">LINKING...</span>
    </button>

    <div class="top-content">
        <h1>Energy Monitoring System</h1>
        <h2>Ina Peromingan & Aljun Dela Peña</h2>
        <p style="opacity: 0.6; max-width: 600px;">Click the status button to start/stop the ESP data synchronization across all rooms.</p>
    </div>

    <div class="rooms-container">
        <div class="room-row" id="r1">
            <div class="room-label" style="color: var(--pink);">ROOM 1</div>
            <div class="data-area">
                <div class="canvas-box"><canvas id="c1"></canvas></div>
                <div class="power-txt" id="v1" style="color: var(--pink);">0.00 W</div>
            </div>
        </div>
        <div class="room-row" id="r2">
            <div class="room-label" style="color: var(--teal);">ROOM 2</div>
            <div class="data-area">
                <div class="canvas-box"><canvas id="c2"></canvas></div>
                <div class="power-txt" id="v2" style="color: var(--teal);">0.00 W</div>
            </div>
        </div>
        <div class="room-row" id="r3">
            <div class="room-label" style="color: var(--gold);">ROOM 3</div>
            <div class="data-area">
                <div class="canvas-box"><canvas id="c3"></canvas></div>
                <div class="power-txt" id="v3" style="color: var(--gold);">0.00 W</div>
            </div>
        </div>
    </div>

    <script>
        const charts = {};
        const colors = { 1: '#FFC0CB', 2: '#64ffda', 3: '#FFD700' };
        let isRunning = false;

        function initChart(id, color) {
            return new Chart(document.getElementById(`c${id}`).getContext('2d'), {
                type: 'line',
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        data: Array(15).fill(0),
                        borderColor: color,
                        backgroundColor: color + '22',
                        borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { display: false, min: 0, max: 400 }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        for(let i=1; i<=3; i++) charts[i] = initChart(i, colors[i]);

        const toggleBtn = document.getElementById('status-toggle');
        const dot = document.getElementById('dot');
        const label = document.getElementById('label');

        toggleBtn.addEventListener('click', () => {
            isRunning = !isRunning; // Flip the switch
            
            if(isRunning) {
                toggleBtn.classList.add('connected');
                dot.classList.add('active-pulse');
                label.innerText = "CONNECTED";
            } else {
                toggleBtn.classList.remove('connected');
                dot.classList.remove('active-pulse');
                label.innerText = "LINKING...";
                
                // Reset display back to 0
                for(let i=1; i<=3; i++) {
                    document.getElementById(`v${i}`).innerText = "0.00 W";
                    charts[i].data.datasets[0].data = Array(15).fill(0);
                    charts[i].update();
                }
            }
        });

        setInterval(() => {
            if(!isRunning) return;
            const ranges = { 1: [215, 235], 2: [145, 165], 3: [310, 345] };
            for(let i=1; i<=3; i++) {
                const val = (Math.random() * (ranges[i][1] - ranges[i][0]) + ranges[i][0]).toFixed(2);
                document.getElementById(`v${i}`).innerText = `${val} W`;
                charts[i].data.datasets[0].data.push(val);
                charts[i].data.datasets[0].data.shift();
                charts[i].update('none');
            }
        }, 1000);
    </script>
</body>
</html>
